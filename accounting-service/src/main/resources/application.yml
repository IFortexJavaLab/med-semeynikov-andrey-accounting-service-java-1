spring:
  application:
    name: accounting-service

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: <CLIENT-ID>
            client-secret: <CLIENT-SECRET>>
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: true

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: ifortex
    password: ifortex

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: sandbox.smtp.mailtrap.io
    username: <USERNAME>
    password: <PASSWORD>
    port: 2525

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: kyc-verification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ifortex.internship.medstarter.model.kafka"


  profiles:
    active: dev

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081

app:
  jwtSecret: 5d9790e5409c4ba5b52d988110ba3e63b02d60525917825c99fba26506c66c18625f6c1ad2dde820a6591851e8947e03ace8b83f6ce4e8b31248cd1d53733e6aa50b6a540f9c09a239ae1476bd04ce37126f04fe2e3b6d223e9231f6b938a6f514f2166a8e82e168062a6ed0481d292139b3a081874fe5074e9f4e8e8bce40ac
  refreshTokenExpirationS: 604800
  jwtExpirationS: 3600
  otp:
    resetPasswordExpirationMinutes: 5
    loginExpirationMinutes: 5
    emailExpirationMinutes: 60
  tempPassword:
    expirationHours: 48
  stripe:
    api:
      key: <STRIPE-KEY>
      webhook:
        secret: <WEBHOOK-SECRET>
    url:
      success: http://localhost:8081/success.html
      cancel: http://localhost:8081/cancel.html
