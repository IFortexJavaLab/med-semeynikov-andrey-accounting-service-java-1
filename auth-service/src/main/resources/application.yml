spring:
  application:
    name: auth-service

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: <client-id>
            client-secret: <client-secret>

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: true

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: ifortex
    password: ifortex

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: smtp.gmail.com
    username: <email>
    password: <password>
    port: 587

  profiles:
    active: dev

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

app:
  jwtSecret: 5d9790e5409c4ba5b52d988110ba3e63b02d60525917825c99fba26506c66c18625f6c1ad2dde820a6591851e8947e03ace8b83f6ce4e8b31248cd1d53733e6aa50b6a540f9c09a239ae1476bd04ce37126f04fe2e3b6d223e9231f6b938a6f514f2166a8e82e168062a6ed0481d292139b3a081874fe5074e9f4e8e8bce40ac
  refreshTokenExpirationS: 604800
  jwtExpirationS: 3600
  otp:
    resetPasswordExpirationMinutes: 5
    loginExpirationMinutes: 5
    emailExpirationMinutes: 60
  tempPassword:
    expirationHours: 48
  link:
    verifyOtpLogin: http://localhost:8085/api/v1/auth/login/verify-otp.
    resetPasswordConfirm: http://localhost:8085/api/v1/account/password/reset-confirm
    resetPasswordEmail: http://localhost:8085/api/v1/account/password/reset?%s
    login: http://localhost:8085/api/v1/auth/login
    changeEmail: http://localhost:8085/api/v1/account/email-confirm
  stripe:
    api:
      key: <API KEY>
      webhook:
        secret: <WEBHOOK SECRET>
    url:
      success: http://localhost:8081/success.html
      cancel: http://localhost:8081/cancel.html


